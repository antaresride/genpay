name: Build LLVM 21.1.0

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-llvm.yml']

env:
  LLVM_VERSION: 21.1.0
  LLVM_BUILD_DIR: ${{ github.workspace }}/llvm-build
  LLVM_INSTALL_DIR: ${{ github.workspace }}/llvm-21

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Verify Xcode Command Line Tools
        run: |
          xcode-select -p
          xcrun --show-sdk-path
          clang --version

      - name: Install minimal dependencies
        run: |
          brew install ninja cmake || true
          which clang
          clang --version

      - name: Create working directory
        run: |
          mkdir -p ${{ env.LLVM_BUILD_DIR }}
          echo "Build directory: ${{ env.LLVM_BUILD_DIR }}"

      - name: Clone LLVM
        working-directory: ${{ env.LLVM_BUILD_DIR }}
        run: |
          git clone --depth 1 --branch llvmorg-${{ env.LLVM_VERSION }} https://github.com/llvm/llvm-project.git
          cd llvm-project
          echo "LLVM commit: $(git rev-parse HEAD)"

      - name: Configure with CMake
        working-directory: ${{ env.LLVM_BUILD_DIR }}/llvm-project
        run: |
          mkdir build && cd build
          
          cmake -G Ninja \
            -S ../llvm \
            -B . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ env.LLVM_INSTALL_DIR }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_C_COMPILER=/usr/bin/clang \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
            -DDEFAULT_SYSROOT="$(xcrun --show-sdk-path)" \
            -DLLVM_DEFAULT_TARGET_TRIPLE=arm64-apple-darwin \
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86;ARM;WebAssembly" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DLLVM_ENABLE_RTTI=ON \
            -DLLVM_ENABLE_EH=ON \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INSTALL_UTILS=ON \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBEDIT=OFF \
            -DLLVM_ENABLE_LIBPFM=OFF \
            -DLLVM_ENABLE_CURL=OFF \
            -DLLVM_ENABLE_HTTPLIB=OFF

      - name: Build
        working-directory: ${{ env.LLVM_BUILD_DIR }}/llvm-project/build
        run: ninja

      - name: Install
        working-directory: ${{ env.LLVM_BUILD_DIR }}/llvm-project/build
        run: ninja install

      - name: Verify portability
        run: |
          echo "=== Checking for external dependencies ==="
          
          if otool -L ${{ env.LLVM_INSTALL_DIR }}/bin/llvm-config | grep -q "/opt/homebrew"; then
            echo "ERROR: Found Homebrew dependencies!"
            otool -L ${{ env.LLVM_INSTALL_DIR }}/bin/llvm-config
            exit 1
          fi
          
          echo "=== Testing llvm-config ==="
          ${{ env.LLVM_INSTALL_DIR }}/bin/llvm-config --version
          ${{ env.LLVM_INSTALL_DIR }}/bin/llvm-config --has-rtti

      - name: Package
        run: |
          cd ${{ github.workspace }}
          tar czf llvm-21-macos-arm64.tar.gz llvm-21/
          ls -lh llvm-21-macos-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-21-macos-arm64
          path: ${{ github.workspace }}/llvm-21-macos-arm64.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/llvm-')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ github.workspace }}/llvm-21-macos-arm64.tar.gz
          name: LLVM ${{ env.LLVM_VERSION }} macOS ARM64
          body: |
            Self-contained LLVM build for macOS ARM64 (Apple Silicon).
            
            ## Requirements
            
            Only **Xcode Command Line Tools** required:
            ```bash
            xcode-select --install
            ```
            
            ## Installation
            
            ```bash
            # Download and extract
            tar xzf llvm-21-macos-arm64.tar.gz -C ~
            
            # IMPORTANT: Remove quarantine attributes (macOS Gatekeeper)
            xattr -r -d com.apple.quarantine ~/llvm-21
            
            # Setup environment (add to ~/.zshrc or ~/.bash_profile)
            export LLVM_SYS_211_PREFIX=$HOME/llvm-21
            export PATH=$LLVM_SYS_211_PREFIX/bin:$PATH
            export DYLD_LIBRARY_PATH=$LLVM_SYS_211_PREFIX/lib:$DYLD_LIBRARY_PATH
            export LIBRARY_PATH=$LLVM_SYS_211_PREFIX/lib:$LIBRARY_PATH
            
            # Verify installation
            llvm-config --version      # Should show 21.1.0
            llvm-config --has-rtti     # Should print "YES"
            ```
            
            ## Troubleshooting
            
            **"Apple cannot check it for malicious software"**
            
            Run the quarantine removal command:
            ```bash
            xattr -r -d com.apple.quarantine ~/llvm-21
            ```
            
            Or bypass for single execution:
            ```bash
            xattr -d com.apple.quarantine ~/llvm-21/bin/llvm-config
            ~/llvm-21/bin/llvm-config --version
            ```
            
            ## Build Configuration
            
            - Targets: AArch64, X86, ARM, WebAssembly
            - Projects: clang, lld
            - RTTI: Enabled (required for Inkwell)
            - Assertions: Enabled
            - DyLib: Enabled
            - No external dependencies (no Homebrew libs)
            
            Optimized for: **Inkwell 0.8.0** / **llvm-sys 211** / **GenPay**

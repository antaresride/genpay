name: CI & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  # 1. Quick check for syntax and formatting errors
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install LLVM 21 (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg curl libz-dev libedit-dev libxml2-dev
          curl -L https://apt.llvm.org/llvm.sh -o llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo ln -sf /usr/lib/llvm-21/bin/llvm-config /usr/bin/llvm-config
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Check Formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy
        run: |
          export LLVM_SYS_211_PREFIX=/usr/lib/llvm-21
          export LIBCLANG_PATH=/usr/lib/llvm-21/lib
          cargo clippy --workspace -- -D warnings

  # 2. Main Test and Build Matrix
  test-and-build:
    name: ${{ matrix.artifact_name }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: genpay-linux
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: genpay-macos
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- LLVM 21 Setup ---
      
      - name: Install LLVM 21 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg curl libz-dev libedit-dev libxml2-dev
          curl -L https://apt.llvm.org/llvm.sh -o llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo ln -sf /usr/lib/llvm-21/bin/llvm-config /usr/bin/llvm-config

      - name: Install LLVM 21 (macOS)
        if: matrix.os == 'macos-15'
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@21)/bin" >> $GITHUB_PATH

      # --- Caching & Testing ---

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Bumped cache key to avoid poisoned cache from failed builds
          key: ${{ matrix.target }}-llvm-21-v5

      - name: Run Tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export LLVM_SYS_211_PREFIX=/usr/lib/llvm-21
          export LIBCLANG_PATH=/usr/lib/llvm-21/lib
          cargo test --workspace --target ${{ matrix.target }}

      - name: Run Tests (macOS)
        if: matrix.os == 'macos-15'
        run: |
          export LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)
          export LIBCLANG_PATH=$(brew --prefix llvm@21)/lib
          cargo test --workspace --target ${{ matrix.target }}

      # --- Release Preparation (Only on Tags) ---

      - name: Build Release Binary (Ubuntu)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'ubuntu-latest'
        run: |
          export LLVM_SYS_211_PREFIX=/usr/lib/llvm-21
          export LIBCLANG_PATH=/usr/lib/llvm-21/lib
          cargo build --release --target ${{ matrix.target }} --bin genpay

      - name: Build Release Binary (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'macos-15'
        run: |
          export LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)
          export LIBCLANG_PATH=$(brew --prefix llvm@21)/lib
          cargo build --release --target ${{ matrix.target }} --bin genpay

      - name: Generate Checksum
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/genpay ./${{ matrix.artifact_name }}
          if command -v sha256sum >/dev/null; then
            sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

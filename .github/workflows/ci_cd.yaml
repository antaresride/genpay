name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    env:
      # Required for inkwell/llvm-sys to find the right LLVM version
      LLVM_SYS_211_PREFIX: /usr/lib/llvm-21
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21
        run: |
          sudo apt-get update
          # Install dependencies required for linking LLVM
          sudo apt-get install -y wget lsb-release software-properties-common gnupg ca-certificates curl libz-dev libedit-dev
          
          # Download and run the official LLVM installation script
          curl -L https://apt.llvm.org/llvm.sh -o llvm.sh
          chmod +x llvm.sh
          # 'all' ensures we get llvm-dev, clang, and lld for the linker crate
          sudo ./llvm.sh 21 all
          
          # Add LLVM binaries to the path so 'llvm-config' is discoverable
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Include llvm-21 in the key so the cache invalidates if you upgrade versions
          key: llvm-21

      - name: Run Tests
        run: cargo test --workspace

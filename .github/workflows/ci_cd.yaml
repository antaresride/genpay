name: CI & Release

on:
    push:
        branches: ["main"]
        tags: ["v*"]
    pull_request:
        branches: ["main"]

permissions:
    contents: write

jobs:
    lint:
        name: Lint & Format
        runs-on: ubuntu-24.04-arm
        env:
            LLVM_SYS_211_PREFIX: /usr/lib/llvm-21
            LIBCLANG_PATH: /usr/lib/llvm-21/lib
        steps:
            - uses: actions/checkout@v4

            - name: Install LLVM 21 (Ubuntu ARM)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y wget lsb-release software-properties-common gnupg curl libz-dev libedit-dev libxml2-dev
                  curl -L https://apt.llvm.org/llvm.sh -o llvm.sh
                  chmod +x llvm.sh
                  sudo ./llvm.sh 21 all
                  sudo ln -sf /usr/lib/llvm-21/bin/llvm-config /usr/bin/llvm-config

            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Check Formatting
              run: cargo fmt --all -- --check

            - name: Clippy
              run: cargo clippy --workspace -- -D warnings

    test-and-build:
        name: ${{ matrix.platform }}
        needs: lint
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04-arm
                      platform: linux-aarch64
                    - os: macos-15
                      platform: macos-aarch64
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable

            - name: Setup LLVM (Ubuntu ARM)
              if: startsWith(matrix.os, 'ubuntu')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y wget lsb-release software-properties-common gnupg curl libz-dev libedit-dev libxml2-dev
                  curl -L https://apt.llvm.org/llvm.sh -o llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21 all
                  echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
                  echo "LIBCLANG_PATH=/usr/lib/llvm-21/lib" >> $GITHUB_ENV

            - name: Setup LLVM (macOS)
              if: startsWith(matrix.os, 'macos')
              run: |
                  brew install llvm@21
                  echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV
                  echo "LIBCLANG_PATH=$(brew --prefix llvm@21)/lib" >> $GITHUB_ENV

            - uses: Swatinem/rust-cache@v2

            - name: Run Tests
              run: cargo test --workspace

            - name: Build Release Binary
              if: startsWith(github.ref, 'refs/tags/v')
              run: cargo build --release --bin genpay

            - name: Prepare Release Assets
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  cp target/release/genpay genpay-${{ matrix.platform }}
                  if command -v sha256sum >/dev/null; then
                    sha256sum genpay-${{ matrix.platform }} > genpay-${{ matrix.platform }}.sha256
                  else
                    shasum -a 256 genpay-${{ matrix.platform }} > genpay-${{ matrix.platform }}.sha256
                  fi

            - name: Upload Artifact
              if: startsWith(github.ref, 'refs/tags/v')
              uses: actions/upload-artifact@v4
              with:
                  name: genpay-${{ matrix.platform }}
                  path: |
                      genpay-${{ matrix.platform }}
                      genpay-${{ matrix.platform }}.sha256

    create-release:
        name: Create Release
        needs: test-and-build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest  # Can stay on x86_64, just downloads artifacts
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: ./artifacts
                  pattern: genpay-*
                  merge-multiple: true
            - uses: softprops/action-gh-release@v2
              with:
                  files: ./artifacts/*
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg ca-certificates
          
          # Download with retry and explicit output name
          wget -O llvm.sh https://apt.llvm.org
          
          if [ -f "llvm.sh" ]; then
            chmod +x llvm.sh
            # 'all' ensures headers and libraries are included for linking
            sudo ./llvm.sh 21 all
          else
            echo "Error: llvm.sh download failed"
            exit 1
          fi

          # Export variables so the 'cargo' steps can find LLVM
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Custom key ensures cache clears if you change LLVM versions
          key: llvm-21

      - name: Run Tests
        # The environment variables from above will be active here
        run: cargo test

name: CI & Release

on:
  push:
    branches: ["feature-lexer"]
    tags: ["v*"]
  pull_request:
    branches: ["feature-lexer"]

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: (Ubuntu ARM)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg curl libz-dev libedit-dev libxml2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

name: CI & Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test-and-build:
    name: ${{ matrix.platform }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            llvm_path: /usr/lib/llvm-21
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macos-aarch64
            llvm_path: /opt/homebrew/opt/llvm@21 # brew --prefix result
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- LLVM Setup (Unified) ---

      - name: Install LLVM 21 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg curl libz-dev libedit-dev libxml2-dev
          curl -fsSL https://apt.llvm.org/llvm.sh -o llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo ln -sf /usr/lib/llvm-21/bin/llvm-config /usr/bin/llvm-config

      - name: Install LLVM 21 (macOS)
        if: matrix.os == 'macos-15'
        run: |
          brew install llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(brew --prefix llvm@21)/lib" >> $GITHUB_ENV
          echo "$(brew --prefix llvm@21)/bin" >> $GITHUB_PATH

      - name: Set LLVM Env (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=/usr/lib/llvm-21/lib" >> $GITHUB_ENV

      # --- Build & Test ---

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-llvm21-v1

      - name: Run Tests
        run: cargo test --workspace --target ${{ matrix.target }}

      # --- Release Build (Tags Only) ---

      - name: Build Release Binary
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo build --release --target ${{ matrix.target }} --bin genpay

      - name: Prepare Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/genpay" "genpay-${{ matrix.platform }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "genpay-${{ matrix.platform }}" > "genpay-${{ matrix.platform }}.sha256"
          else
            shasum -a 256 "genpay-${{ matrix.platform }}" > "genpay-${{ matrix.platform }}.sha256"
          fi

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: genpay-${{ matrix.platform }}
          path: |
            genpay-${{ matrix.platform }}
            genpay-${{ matrix.platform }}.sha256
          if-no-files-found: error # Fail if binaries missing

  create-release:
    name: Create Release
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: genpay-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          fail_on_unmatched_files: true # Fail if artifacts missing
          body: |
            ## Installation

            ### Linux (x86_64)

            ```bash
            cd ~/Downloads
            curl -LO "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/genpay-linux-x86_64"
            curl -LO "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/genpay-linux-x86_64.sha256"
            sha256sum -c genpay-linux-x86_64.sha256
            chmod +x genpay-linux-x86_64
            ./genpay-linux-x86_64 --help
            ```

            ### macOS (Apple Silicon)

            ```bash
            cd ~/Downloads
            curl -LO "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/genpay-macos-aarch64"
            curl -LO "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/genpay-macos-aarch64.sha256"
            shasum -a 256 -c genpay-macos-aarch64.sha256
            xattr -d com.apple.quarantine genpay-macos-aarch64 2>/dev/null || true
            chmod +x genpay-macos-aarch64
            ./genpay-macos-aarch64 --help
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

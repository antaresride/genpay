name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 21
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release software-properties-common gnupg ca-certificates curl
          
          # Use curl with -L to follow redirects and -o to specify the output file
          curl -L https://apt.llvm.org/llvm.sh -o llvm.sh
          
          # Check if the file is a valid shell script (contains #!/bin/bash)
          if grep -q "#!/bin/bash" llvm.sh; then
            chmod +x llvm.sh
            # Use 'all' for full headers/libraries needed by inkwell
            sudo ./llvm.sh 21 all
          else
            echo "Error: Downloaded file is not a valid script. Check if apt.llvm.org is up."
            cat llvm.sh # Print content for debugging in logs
            exit 1
          fi

          # Export variables for inkwell
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: llvm-21

      - name: Run Tests
        run: cargo test
